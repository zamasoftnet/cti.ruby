name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-ruby@v1
        with:
          ruby-version: '3.x'

      - name: Generate API docs
        run: rdoc -N -c UTF-8 -o build/apidoc -m CTI src/code 2>/dev/null || true

      - name: Create dist
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="cti-ruby-${VERSION}"
          STAGEDIR="build/${DIRNAME}"
          mkdir -p "${STAGEDIR}"
          cp -r build/apidoc "${STAGEDIR}/apidoc" 2>/dev/null || true
          cp -r src/. "${STAGEDIR}/"
          rm -rf "${STAGEDIR}/test/out"
          sed "s/@version@/${VERSION}/g" README.md > "${STAGEDIR}/README.md"
          # Create archives
          cd build
          zip -r "${DIRNAME}.zip" "${DIRNAME}"
          tar czf "${DIRNAME}.tar.gz" "${DIRNAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/cti-ruby-*.zip
            build/cti-ruby-*.tar.gz

      - name: Deploy API docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/apidoc
